<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
    background:#f4f6f9;
    font-family:Arial, Helvetica, sans-serif;
    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.form{
    width:400px;
    margin:0 auto 40px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,.15);
}

.form input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:6px;
}

.form button{
    width:100%;
    padding:12px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

.form button:hover{
    background:#388E3C;
}
#container{
    width:100%;
    height:100%;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-top:30px;
}

.card{
    /* width:100%;
    max-width: 280px;; */
    /* margin:auto; */
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,.15);
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.details{
    padding:15px;
}

.buttons{
    display:flex;
    justify-content:space-between;
    margin-top:15px;
}

.buttons button{
    border:none;
    padding:8px 16px;
    border-radius:5px;
    color:white;
    cursor:pointer;
}

.edit{
    background:#2196F3;
}

.delete{
    background:#F44336;
}
.card img{
    width:100%;
    height:280px;
    object-fit:cover;
    
}
    </style>
</head>
<body>
    <div class="form">
    
    <input type="hidden" id="id">
    <input type="text" placeholder="Enter name " id="name"><br>
    <input type="text" placeholder="Enter Image link " id="image"><br>
    <button onclick="savedata()">Save data</button><br><br>
    <button onclick="location.href='user.html'">View Students</button>
    </div>
    <div id="container"></div>
<script src="./details.js"></script>
    
</body>
</html>
